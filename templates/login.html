{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 60vh;">
  <div class="card w-100" style="max-width: 400px;">
    <div class="card-header text-center py-3">
      <h5 class="mb-0">System Login</h5>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label for="username" class="form-label fw-bold">Username</label>
          <input type="text" class="form-control rounded-1" id="username" name="username" required autofocus value="{{ request.form.get('username', '') }}">
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-bold">Password</label>
          <input type="password" class="form-control rounded-1" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
      </form>
      
      <hr class="my-4">
      
      <div class="bg-light p-3 rounded-1 border" style="font-size: 0.85rem;">
        <strong>Demo Accounts:</strong><br>
        Admin: <code>admin</code> / <code>admin123</code><br>
        Student: <code>hamed</code> / <code>student123</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
