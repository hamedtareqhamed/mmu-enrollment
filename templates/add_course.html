{% extends "base.html" %}

{% block title %}Add Course{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h2 class="mb-0">Add New Course</h2>
  </div>
</div>

<div class="container pb-5" style="max-width: 800px;">
  <div class="card">
    <div class="card-header py-3">Course &amp; Mandatory Lecture Setup</div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('add_course') }}">
        
        <h5 class="mb-3 text-primary border-bottom pb-2">Course Information</h5>
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="course_code" class="form-label fw-bold">Course Code *</label>
            <input type="text" class="form-control rounded-1" id="course_code" name="course_code" required value="{{ request.form.get('course_code', '') }}">
          </div>
          <div class="col-md-6">
            <label for="credit_hours" class="form-label fw-bold">Credit Hours *</label>
            <select class="form-select rounded-1" id="credit_hours" name="credit_hours" required>
              <option value="3" {{ 'selected' if request.form.get('credit_hours') == '3' else '' }}>3</option>
              <option value="4" {{ 'selected' if request.form.get('credit_hours') == '4' else '' }}>4</option>
              <option value="2" {{ 'selected' if request.form.get('credit_hours') == '2' else '' }}>2</option>
              <option value="1" {{ 'selected' if request.form.get('credit_hours') == '1' else '' }}>1</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="course_name" class="form-label fw-bold">Course Name *</label>
          <input type="text" class="form-control rounded-1" id="course_name" name="course_name" required value="{{ request.form.get('course_name', '') }}">
        </div>
        <div class="mb-4">
          <label for="description" class="form-label fw-bold">Description</label>
          <textarea class="form-control rounded-1" id="description" name="description" rows="2">{{ request.form.get('description', '') }}</textarea>
        </div>

        <h5 class="mb-3 text-success border-bottom pb-2 mt-4">First Lecture Schedule</h5>
        <div class="alert alert-warning py-2 rounded-1">
          <strong>Note:</strong> The first section of any course is automatically a Lecture.
        </div>
        
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="section_name" class="form-label fw-bold">Section Name *</label>
            <input type="text" class="form-control rounded-1" id="section_name" name="section_name" placeholder="e.g. Lecture A" required value="{{ request.form.get('section_name', '') }}">
          </div>
          <div class="col-md-6">
            <label for="max_capacity" class="form-label fw-bold">Max Capacity *</label>
            <input type="number" class="form-control rounded-1" id="max_capacity" name="max_capacity" min="1" required value="{{ request.form.get('max_capacity', '') }}">
          </div>
        </div>
        
        <div class="row mb-4">
          <div class="col-md-4">
            <label for="day" class="form-label fw-bold">Day *</label>
            <select class="form-select rounded-1" id="day" name="day" required>
              <option value="">Select Day</option>
              {% for d in days %}
                <option value="{{ d }}" {{ 'selected' if request.form.get('day') == d else '' }}>{{ d }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label for="time" class="form-label fw-bold">Time Slot *</label>
            <input type="text" class="form-control rounded-1" id="time" name="time" placeholder="e.g. 10:00 - 12:00" required value="{{ request.form.get('time', '') }}">
          </div>
          <div class="col-md-4">
            <label for="venue" class="form-label fw-bold">Venue *</label>
            <input type="text" class="form-control rounded-1" id="venue" name="venue" required value="{{ request.form.get('venue', '') }}">
          </div>
        </div>
        
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary fw-bold px-4">Save Course</button>
          <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
        
      </form>
    </div>
  </div>
</div>
{% endblock %}
